name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  static-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node .claude/scripts/static-checks.js

      - name: Check UTF-8 mojibake in wiki
        run: |
          if grep -rl '�' wiki/ --include='*.md' 2>/dev/null; then
            echo "FAIL: UTF-8 replacement characters (U+FFFD) found in wiki markdown files"
            exit 1
          else
            echo "PASS: No mojibake detected"
          fi

      - name: Check cross-repo URL references
        run: bash scripts/check-cross-repo-urls.sh

      - name: Verify hooks symlink targets
        run: |
          COMMON_HOOKS=(_common backslash-bang-guard.sh credential-guard.sh destructive-command-guard.sh exfil-guard.sh instruction-lint.sh instruction-prereq-guard.sh session-start-guard.sh)
          errors=0
          for hook in "${COMMON_HOOKS[@]}"; do
            if [ ! -f ".claude/hooks/$hook" ]; then
              echo "MISS: .claude/hooks/$hook not found"
              errors=$((errors + 1))
            else
              echo "  OK: .claude/hooks/$hook exists"
            fi
          done
          if [ $errors -gt 0 ]; then
            echo "FAIL: $errors common hook(s) missing"
            exit 1
          else
            echo "PASS: All common hooks present in pd"
          fi
