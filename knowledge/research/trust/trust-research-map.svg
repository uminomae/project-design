  <text x="100" y="745" text-anchor="middle" fill="#666" font-size="9.5">CN-005</text>
  <text x="100" y="757" text-anchor="middle" fill="#666" font-size="9.5">CN-006</text>

  <circle cx="340" cy="720" r="7" fill="#d4a017"/>
