  <g font-size="11.5" fill="#1a1a2e">
    <rect x="816" y="164" width="344" height="24" fill="#fff" rx="3" stroke="#27ae60" stroke-width="0.5"/>
    <text x="824" y="181"><tspan font-weight="600" fill="#27ae60">#8</tspan>  愛着と信頼 (13KB)</text>

    <rect x="816" y="192" width="344" height="24" fill="#f0faf3" rx="3" stroke="#27ae60" stroke-width="0.5"/>
    <text x="824" y="209"><tspan font-weight="600" fill="#27ae60">#9</tspan>  AI信頼: 依拠・較正・信頼性 (11KB)</text>

    <rect x="816" y="220" width="344" height="24" fill="#fff" rx="3" stroke="#27ae60" stroke-width="0.5"/>
    <text x="824" y="237"><tspan font-weight="600" fill="#27ae60">#10</tspan> 信頼の神経現象学 (12KB)</text>

    <rect x="816" y="248" width="344" height="24" fill="#f0faf3" rx="3" stroke="#27ae60" stroke-width="0.5"/>
