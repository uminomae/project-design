    <circle cx="828" cy="592" r="5" fill="#c0392b"/>
    <text x="842" y="596">AIガスライティング（文献希少）</text>

    <circle cx="828" cy="620" r="5" fill="#c0392b"/>
    <text x="842" y="624">欠損駆動思考との接続</text>
