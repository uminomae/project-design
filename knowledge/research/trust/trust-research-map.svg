    <rect x="520" y="494" width="140" height="28" fill="#e8f4f8" rx="14" stroke="#0c7b93" stroke-width="1"/>
    <text x="590" y="513" text-anchor="middle" font-weight="600">N5 監視の限界</text>
  </g>

  <!-- 十分条件 -->
  <text x="40" y="550" fill="#1a1a2e" font-size="13" font-weight="700">十分条件（領域依存）</text>
  <g font-size="11.5" fill="#666">
    <rect x="40" y="560" width="80" height="24" fill="#fff3cd" rx="12" stroke="#d4a017" stroke-width="1"/>
    <text x="80" y="577" text-anchor="middle">対人</text>
    <rect x="130" y="560" width="80" height="24" fill="#fff3cd" rx="12" stroke="#d4a017" stroke-width="1"/>
    <text x="170" y="577" text-anchor="middle">自己</text>
    <rect x="220" y="560" width="80" height="24" fill="#fff3cd" rx="12" stroke="#d4a017" stroke-width="1"/>
