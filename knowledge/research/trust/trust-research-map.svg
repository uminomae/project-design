  <text x="340" y="745" text-anchor="middle" fill="#666" font-size="9.5">3 LLM 広域調査</text>
  <text x="340" y="757" text-anchor="middle" fill="#666" font-size="9.5">深掘り第1波</text>

  <circle cx="540" cy="720" r="7" fill="#27ae60"/>
  <text x="540" y="712" text-anchor="middle" fill="#27ae60" font-size="10" font-weight="600">3/27</text>
  <text x="540" y="745" text-anchor="middle" fill="#666" font-size="9.5">深掘り第2波</text>
  <text x="540" y="757" text-anchor="middle" fill="#666" font-size="9.5">統合レポート</text>

  <circle cx="720" cy="720" r="7" fill="#8e44ad"/>
