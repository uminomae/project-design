  <rect x="800" y="124" width="376" height="290" fill="url(#phase3)" rx="8" filter="url(#shadow)"/>
  <rect x="800" y="124" width="376" height="32" fill="#27ae60" rx="8"/>
  <rect x="800" y="148" width="376" height="8" fill="#27ae60"/>
  <text x="816" y="146" fill="#fff" font-size="14" font-weight="600">Phase 3: 9本の深掘り調査</text>
  <text x="1152" y="146" fill="#d4efdf" font-size="11" text-anchor="end">3月26-27日</text>

