  <rect x="40" y="352" width="338" height="48" fill="#e0f7fa" rx="5" stroke="#0c7b93" stroke-width="1" stroke-dasharray="4"/>
  <text x="56" y="372" fill="#0c7b93" font-size="11" font-weight="600">核心的知見:</text>
  <text x="56" y="388" fill="#0c7b93" font-size="11">「信頼に単一の固定定義は存在しない」(Session 18)</text>

  <!-- ═══════ Phase 2: マルチLLM調査 ═══════ -->
  <rect x="406" y="124" width="382" height="290" fill="url(#phase2)" rx="8" filter="url(#shadow)"/>
  <rect x="406" y="124" width="382" height="32" fill="#d4a017" rx="8"/>
  <rect x="406" y="148" width="382" height="8" fill="#d4a017"/>
  <text x="422" y="146" fill="#fff" font-size="14" font-weight="600">Phase 2: マルチLLM広域調査</text>
  <text x="764" y="146" fill="#fff8dc" font-size="11" text-anchor="end">3月26日</text>

  <!-- 3 LLM -->
  <rect x="422" y="168" width="350" height="44" fill="#fff" rx="5" stroke="#d4a017" stroke-width="1"/>
  <circle cx="440" cy="190" r="8" fill="#74b9ff"/>
  <text x="456" y="186" fill="#1a1a2e" font-size="12" font-weight="600">trust-codex-20260326.md</text>
  <text x="456" y="202" fill="#666" font-size="11">Codex / 62KB / 12分野横断レビュー</text>

  <rect x="422" y="220" width="350" height="44" fill="#fff" rx="5" stroke="#d4a017" stroke-width="1"/>
  <circle cx="440" cy="242" r="8" fill="#a29bfe"/>
  <text x="456" y="238" fill="#1a1a2e" font-size="12" font-weight="600">trust-chatgpt-20260326.md</text>
  <text x="456" y="254" fill="#666" font-size="11">ChatGPT / 53KB / 神経経済学・オキシトシン</text>

  <rect x="422" y="272" width="350" height="44" fill="#fff" rx="5" stroke="#d4a017" stroke-width="1"/>
  <circle cx="440" cy="294" r="8" fill="#fd79a8"/>
  <text x="456" y="290" fill="#1a1a2e" font-size="12" font-weight="600">trust-chatgpt-pro-20260326.md</text>
  <text x="456" y="306" fill="#666" font-size="11">ChatGPT Pro / 41KB / 分野別詳細整理</text>

  <!-- 統合成果物 -->
  <rect x="422" y="328" width="350" height="34" fill="#fff8dc" rx="5" stroke="#d4a017" stroke-width="1" stroke-dasharray="4"/>
  <text x="440" y="350" fill="#d4a017" font-size="12" font-weight="600">--> trust-integrated.md (16KB, Issue #34)</text>

  <rect x="422" y="370" width="350" height="34" fill="#fff8dc" rx="5" stroke="#d4a017" stroke-width="1" stroke-dasharray="4"/>
  <text x="440" y="392" fill="#d4a017" font-size="11" font-weight="600">--> trust-necessary-sufficient-conditions.md (techo#60)</text>

