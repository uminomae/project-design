    <rect x="170" y="494" width="120" height="28" fill="#e8f4f8" rx="14" stroke="#0c7b93" stroke-width="1"/>
    <text x="230" y="513" text-anchor="middle" font-weight="600">N2 不確実性</text>

    <rect x="300" y="494" width="100" height="28" fill="#e8f4f8" rx="14" stroke="#0c7b93" stroke-width="1"/>
