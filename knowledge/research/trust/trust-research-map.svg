      <stop offset="0%" stop-color="#e8f4f8"/>
      <stop offset="100%" stop-color="#d1ecf1"/>
    </linearGradient>
    <linearGradient id="phase2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff3cd"/>
      <stop offset="100%" stop-color="#ffeaa7"/>
