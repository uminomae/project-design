  <text x="32" y="42" fill="#fff" font-size="24" font-weight="700">信頼調査リサーチマップ</text>
  <text x="680" y="42" fill="#8899aa" font-size="13" text-anchor="middle">project-design / knowledge / research / trust</text>
  <text x="1168" y="42" fill="#8899aa" font-size="13" text-anchor="end">2026-04-03</text>

  <!-- 統計バー -->
  <rect x="24" y="76" width="1152" height="36" fill="#eef2f7" rx="6"/>
  <text x="48" y="99" fill="#555" font-size="13">20 ファイル</text>
  <text x="170" y="99" fill="#555" font-size="13">340 KB</text>
  <text x="280" y="99" fill="#555" font-size="13">12+ 学術分野</text>
  <text x="430" y="99" fill="#555" font-size="13">3 LLM エンジン</text>
  <text x="600" y="99" fill="#555" font-size="13">10 Issue (#6, #8-#10, #20-#23, #25-#26)</text>
  <text x="1020" y="99" fill="#555" font-size="13">2026年2月-3月</text>

  <!-- ═══════ Phase 1: 概念基盤 ═══════ -->
  <rect x="24" y="124" width="370" height="290" fill="url(#phase1)" rx="8" filter="url(#shadow)"/>
  <rect x="24" y="124" width="370" height="32" fill="#0c7b93" rx="8"/>
  <rect x="24" y="148" width="370" height="8" fill="#0c7b93"/>
  <text x="40" y="146" fill="#fff" font-size="14" font-weight="600">Phase 1: 概念基盤の構築</text>
  <text x="370" y="146" fill="#b8e6f0" font-size="11" text-anchor="end">2月</text>

  <!-- CN-005 -->
  <rect x="40" y="168" width="338" height="52" fill="#fff" rx="5" stroke="#0c7b93" stroke-width="1"/>
  <text x="56" y="188" fill="#1a1a2e" font-size="12" font-weight="600">CN-005 信頼仮説インベントリ</text>
  <text x="56" y="206" fill="#666" font-size="11">17仮説 (H01-H08 中核) / 精神分析・F-O軸・BSPL</text>

  <!-- CN-006 -->
  <rect x="40" y="228" width="338" height="52" fill="#fff" rx="5" stroke="#0c7b93" stroke-width="1"/>
  <text x="56" y="248" fill="#1a1a2e" font-size="12" font-weight="600">CN-006 信頼分析軸</text>
  <text x="56" y="266" fill="#666" font-size="11">4軸: 時間・内容・状態・F-O直交性</text>

  <!-- PROMPT -->
  <rect x="40" y="288" width="338" height="52" fill="#fff" rx="5" stroke="#0c7b93" stroke-width="1"/>
  <text x="56" y="308" fill="#1a1a2e" font-size="12" font-weight="600">PROMPT.md</text>
  <text x="56" y="326" fill="#666" font-size="11">3 LLM 共通プロンプト (8KB)</text>

