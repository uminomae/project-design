    <linearGradient id="phase3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4edda"/>
      <stop offset="100%" stop-color="#b7e4c7"/>
    </linearGradient>
    <linearGradient id="nextGrad" x1="0" y1="0" x2="0" y2="1">
