    <rect x="816" y="304" width="344" height="24" fill="#f0faf3" rx="3" stroke="#27ae60" stroke-width="0.5"/>
    <text x="824" y="321"><tspan font-weight="600" fill="#27ae60">#22</tspan> ガスライティング: 三層損傷 (14KB)</text>

    <rect x="816" y="332" width="344" height="24" fill="#fff" rx="3" stroke="#27ae60" stroke-width="0.5"/>
