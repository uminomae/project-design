    <text x="210" y="632">2. 責任の明確化</text>
    <text x="370" y="632">3. 感情的承認</text>
    <text x="40" y="648">4. 実質的変化</text>
    <text x="210" y="648">5. 反復的一貫性</text>
    <text x="370" y="648">6. 再依存の再学習</text>
  </g>

