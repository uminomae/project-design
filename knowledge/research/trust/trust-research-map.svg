  <circle cx="900" cy="720" r="7" fill="#e74c3c"/>
  <text x="900" y="712" text-anchor="middle" fill="#e74c3c" font-size="10" font-weight="600">3/31</text>
  <text x="900" y="745" text-anchor="middle" fill="#666" font-size="9.5">必要十分条件</text>
  <text x="900" y="757" text-anchor="middle" fill="#666" font-size="9.5">(techo#60)</text>

  <circle cx="1080" cy="720" r="6" fill="none" stroke="#c0392b" stroke-width="2" stroke-dasharray="3"/>
  <text x="1080" y="712" text-anchor="middle" fill="#c0392b" font-size="10" font-weight="600">次</text>
  <text x="1080" y="745" text-anchor="middle" fill="#999" font-size="9.5">統合</text>
  <text x="1080" y="757" text-anchor="middle" fill="#999" font-size="9.5">深掘り v2</text>

  <!-- ═══════ ディレクトリツリー ═══════ -->
  <rect x="24" y="780" width="1152" height="108" fill="#1a1a2e" rx="8"/>
  <g font-family="'SF Mono', 'Menlo', monospace" font-size="10.5" fill="#8899aa">
    <text x="40" y="800" fill="#74b9ff">knowledge/</text>
    <text x="40" y="816">  concepts/  CN-005 (仮説)  CN-006 (分析軸)</text>
